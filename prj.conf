CONFIG_EARLY_CONSOLE=y
CONFIG_SHELL=y

CONFIG_NETWORKING=y
# Use the testing RNG. This is NOT suitable for production use. Some devices do
# not have a built-in RNG in Zephyr upstream, so this is convenient for testing.
# CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048

CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_BUF_DATA_SIZE=256
CONFIG_NET_DEBUG_NET_PKT_ALLOC=y
CONFIG_MEM_SLAB_TRACE_MAX_UTILIZATION=y

# Network protocols
CONFIG_NET_DHCPV4=y

CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n

CONFIG_NET_TCP=y

CONFIG_NET_LOG=y
CONFIG_INIT_STACKS=y

CONFIG_NET_SHELL=y

CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_PERIODIC_OUTPUT=n

CONFIG_WIFI=y
CONFIG_WIFI_LOG_LEVEL_ERR=y
CONFIG_NET_L2_WIFI_SHELL=y

CONFIG_NET_L2_ETHERNET=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y

CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_CONNECT_STORED=y

# Memfault configuration
CONFIG_MEMFAULT=y
CONFIG_MEMFAULT_LOGGING_ENABLE=y
CONFIG_MEMFAULT_HTTP_ENABLE=y
CONFIG_MEMFAULT_HTTP_PERIODIC_UPLOAD=y
CONFIG_MEMFAULT_REBOOT_REASON_CUSTOM_ENABLE=y
CONFIG_MEMFAULT_PERIODIC_FOTA_CHECK=y

# Additional network configuration for Memfault features
CONFIG_DNS_RESOLVER=y
# Increase DNS server max count to 2, for some networks that have a primary and
# secondary DNS server
CONFIG_DNS_RESOLVER_MAX_SERVERS=2
CONFIG_NET_SOCKETS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_USER_API=y
# Bump this up a bit from the default of 4; this will enable SNTP, DHCP, +
# Memfault checkins to run concurrently.
CONFIG_NET_MAX_CONN=6

# MbedTLS config
CONFIG_MBEDTLS_SHA1=y
CONFIG_MBEDTLS_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=30000
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=4096
CONFIG_MBEDTLS_MEMORY_DEBUG=y
CONFIG_MBEDTLS_SHELL=y
CONFIG_MBEDTLS_AES_ROM_TABLES=y

# Disable PSA Crypto. We are missing some key flag or feature in PSA Crypto that
# prevents establishing a TLS connection with Memfault. Using MbedTLS built in
# ("legacy") crypto instead, which works fine.
# CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_MBEDTLS_USE_PSA_CRYPTO=n

# Credential shell, useful for debug
CONFIG_TLS_CREDENTIALS_SHELL=y
# Required for TLS crediential shell
CONFIG_BASE64=y

# More verbose Memfault component logs
CONFIG_MEMFAULT_LOG_LEVEL_DBG=y

# Don't log printk() statements, they're meant for raw output to the console.
CONFIG_LOG_PRINTK=n

# Disable these temporarily, for debugging.
CONFIG_MEMFAULT_COREDUMP_COLLECT_DATA_REGIONS=y
CONFIG_MEMFAULT_COREDUMP_COLLECT_KERNEL_REGION=n
CONFIG_MEMFAULT_COREDUMP_COLLECT_TASKS_REGIONS=n

# Memfault's http client needs a small amount of heap. Zephyr requires a minimum
# heap size for the applied configuration, so select that here to prevent a
# build time message
CONFIG_HEAP_MEM_POOL_SIZE=52224
CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_ASSERT=y

# Enable MCUboot
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_SHELL=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_IMG_MANAGER=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y

# For cpu_temp metric
CONFIG_SENSOR=y
CONFIG_ADC=y

# SNTP / real-time clock synchronization
# Uses the Zephyr SNTP client directly (sntp_init/query/close) to query
# pool.ntp.org and set the kernel real-time clock via sys_clock_settime.
# UDP is required by the SNTP subsystem.
CONFIG_SNTP=y
CONFIG_NET_UDP=y

# RTC: use the ESP32 RTC timer counter directly (keeps running through soft
# resets).  We store a (unix_epoch, counter_ticks) anchor in RTC slow RAM using
# RTC_NOINIT_ATTR from esp_attr.h (section .rtc_noinit).  RTC slow RAM is a
# separate hardware region, immune to FOTA updates shifting the .data layout.
# On the next boot we read the counter, compute elapsed seconds, and restore the
# kernel clock before the first SNTP sync fires.
# CONFIG_COUNTER enables the Zephyr counter API; the ESP32 RTC counter driver is
# auto-enabled by DT_HAS_ESPRESSIF_ESP32_RTC_TIMER_ENABLED (set in overlays).
CONFIG_COUNTER=y

# Show real wall-clock timestamps in log output once SNTP sets the clock
CONFIG_LOG_TIMESTAMP_USE_REALTIME=y

# Enable compiler warnings as errors
CONFIG_COMPILER_WARNINGS_AS_ERRORS=y
